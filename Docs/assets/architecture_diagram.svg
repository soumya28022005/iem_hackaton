<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" rx="16" fill="#0F172A"/>
  
  <!-- Definitions for Gradients and Shadows -->
  <defs>
    <linearGradient id="grad_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad_purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- External Systems Layer -->
  <rect x="50" y="50" width="1100" height="120" rx="12" stroke="#334155" stroke-dasharray="8 4" fill="transparent"/>
  <text x="60" y="40" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14" font-weight="600">EXTERNAL ECOSYSTEM</text>
  
  <!-- External Icons/Boxes -->
  <rect x="100" y="70" width="160" height="80" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="180" y="115" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14">Sentry Webhooks</text>
  
  <rect x="300" y="70" width="160" height="80" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="380" y="115" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14">GitHub API</text>
  
  <rect x="500" y="70" width="160" height="80" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="580" y="115" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14">Telegram Bot</text>
  
  <rect x="700" y="70" width="160" height="80" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="780" y="115" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14">Groq AI (LPU)</text>
  
  <rect x="900" y="70" width="160" height="80" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="980" y="115" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14">Claude 3.5</text>

  <!-- Central Nexus Layer -->
  <rect x="250" y="250" width="700" height="300" rx="20" fill="url(#grad_blue)" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="285" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="2">NEXUSOPS CORE ENGINE</text>
  
  <!-- Internal Components -->
  <rect x="300" y="320" width="180" height="100" rx="12" fill="#1E293B" stroke="#3B82F6"/>
  <text x="390" y="365" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="16" font-weight="600">AutoFix Engine</text>
  <text x="390" y="385" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Pipeline Orchestrator</text>
  
  <rect x="720" y="320" width="180" height="100" rx="12" fill="#1E293B" stroke="#8B5CF6"/>
  <text x="810" y="365" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="16" font-weight="600">Memory Engine</text>
  <text x="810" y="385" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">RAG & Vector Search</text>

  <rect x="510" y="440" width="180" height="80" rx="12" fill="#1E293B" stroke="#10B981"/>
  <text x="600" y="485" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="16" font-weight="600">Nexus Link</text>
  <text x="600" y="505" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Knowledge Bridge</text>

  <!-- Data Layer -->
  <rect x="50" y="630" width="1100" height="120" rx="12" fill="url(#grad_purple)" stroke="#7C3AED" stroke-dasharray="4 4"/>
  <text x="600" y="660" text-anchor="middle" fill="#A78BFA" font-family="Inter, sans-serif" font-size="14" font-weight="600">PERSISTENCE LAYER</text>
  
  <circle cx="200" cy="700" r="40" fill="#1E293B" stroke="#7C3AED"/>
  <text x="200" y="705" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12" font-weight="600">PostgreSQL</text>
  
  <circle cx="400" cy="700" r="40" fill="#1E293B" stroke="#7C3AED"/>
  <text x="400" y="705" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12" font-weight="600">pgvector</text>
  
  <circle cx="600" cy="700" r="40" fill="#1E293B" stroke="#7C3AED"/>
  <text x="600" y="705" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12" font-weight="600">Redis</text>
  
  <circle cx="800" cy="700" r="40" fill="#1E293B" stroke="#7C3AED"/>
  <text x="800" y="705" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12" font-weight="600">Upstash</text>
  
  <circle cx="1000" cy="700" r="40" fill="#1E293B" stroke="#7C3AED"/>
  <text x="1000" y="705" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12" font-weight="600">Cloudflare R2</text>

  <!-- Connecting Lines -->
  <path d="M 180 150 L 180 200 L 390 200 L 390 320" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 580 150 L 580 320" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 810 150 L 810 320" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <path d="M 390 420 L 390 630" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 810 420 L 810 630" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>
</svg>
