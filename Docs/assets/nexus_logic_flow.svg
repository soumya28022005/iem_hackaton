<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="700" rx="20" fill="#0F172A"/>
  
  <!-- Header -->
  <text x="50" y="50" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="24" font-weight="800">The "Nexus Link" Logic</text>
  <text x="50" y="80" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14">How Team Memory meets Production Errors</text>

  <!-- Lane 1: The Incident (Bottom-Up) -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="300" height="450" rx="12" fill="#1E293B" stroke="#EF4444" stroke-opacity="0.5"/>
    <text x="20" y="30" fill="#EF4444" font-family="Inter, sans-serif" font-size="12" font-weight="700">1. ERROR INGESTION</text>
    
    <!-- Stack Trace Block -->
    <rect x="20" y="50" width="260" height="100" rx="6" fill="#0F172A"/>
    <text x="30" y="75" fill="#EF4444" font-family="monospace" font-size="10">Traceback (most recent call):</text>
    <text x="30" y="90" fill="#94A3B8" font-family="monospace" font-size="9">  File "auth.py", line 42, in login</text>
    <text x="30" y="105" fill="#94A3B8" font-family="monospace" font-size="9">    user = db.get_user(uid)</text>
    <text x="30" y="120" fill="#F8FAFC" font-family="monospace" font-size="10">AttributeError: 'NoneType'...</text>

    <!-- Keyword Extraction -->
    <text x="20" y="180" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Key Extraction:</text>
    <rect x="20" y="190" width="120" height="25" rx="4" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.5"/>
    <text x="30" y="207" fill="#60A5FA" font-family="Inter, sans-serif" font-size="10">#auth-service</text>
    <rect x="150" y="190" width="120" height="25" rx="4" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.5"/>
    <text x="160" y="207" fill="#60A5FA" font-family="Inter, sans-serif" font-size="10">#db-null-pointer</text>
  </g>

  <!-- Lane 2: The Memory (Bottom-Up) -->
  <g transform="translate(650, 150)">
    <rect x="0" y="0" width="300" height="450" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-opacity="0.5"/>
    <text x="20" y="30" fill="#8B5CF6" font-family="Inter, sans-serif" font-size="12" font-weight="700">2. MEMORY RETRIEVAL</text>
    
    <!-- Telegram Snippet -->
    <rect x="20" y="50" width="260" height="100" rx="6" fill="#0F172A"/>
    <text x="30" y="70" fill="#A78BFA" font-family="Inter, sans-serif" font-size="10" font-weight="700">Rahul [Jan 12, 14:30]</text>
    <text x="30" y="90" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">"We should keep the legacy</text>
    <text x="30" y="105" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">user fetch as a fallback if</text>
    <text x="30" y="120" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">the new cache fails."</text>

    <!-- Semantic Link -->
    <text x="20" y="180" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Semantic Overlap:</text>
    <circle cx="150" cy="300" r="60" fill="#8B5CF6" fill-opacity="0.2" stroke="#8B5CF6"/>
    <text x="150" y="305" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="10">Vector Match: 0.89</text>
  </g>

  <!-- The Merge (Middle) -->
  <g transform="translate(375, 250)">
    <path d="M -25 50 Q 50 50 125 150" stroke="#EF4444" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M 275 50 Q 200 50 125 150" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5 5"/>
    
    <rect x="50" y="150" width="150" height="150" rx="75" fill="#F8FAFC" fill-opacity="0.05" stroke="#F8FAFC" stroke-width="1"/>
    <text x="125" y="220" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="16" font-weight="800">THE FIX</text>
    <text x="125" y="240" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">AI synthesizes both</text>
  </g>

  <!-- Output PR -->
  <rect x="350" y="550" width="300" height="80" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
  <text x="500" y="585" text-anchor="middle" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14" font-weight="700">GitHub Pull Request</text>
  <text x="500" y="605" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Includes: "Team context suggests fallback fix"</text>
</svg>
